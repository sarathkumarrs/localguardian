<style>
.km-wrap {
  --km-bg: #faf9f5;
  --km-ink: #26312b;
  --km-sand: #e4ddcd;
  --km-sand-line: #cabf9f;
  --km-green: #3f6b4f;
  --km-green-deep: #2c4d38;
  --km-accent: #b5652a;
  --km-muted: #8a8577;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--km-bg);
  color: var(--km-ink);
  padding: 40px 32px;
  border-radius: 4px;
  max-width: 760px;
  margin: 0 auto;
  box-sizing: border-box;
}
.km-wrap *, .km-wrap *::before, .km-wrap *::after { box-sizing: border-box; }

.km-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--km-sand-line);
  padding-bottom: 20px;
}
.km-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--km-accent);
  font-weight: 600;
}
.km-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 34px;
  font-weight: 400;
  margin: 0;
  letter-spacing: 0.01em;
  color: var(--km-green-deep);
}

.km-body {
  display: flex;
  gap: 36px;
  align-items: flex-start;
}

.km-map-col {
  flex: 0 0 auto;
  width: 46%;
  max-width: 300px;
}
.km-svg {
  width: 100%;
  height: auto;
  display: block;
  overflow: visible;
}

.district {
  fill: var(--km-sand);
  stroke: var(--km-bg);
  stroke-width: 1.6;
  cursor: pointer;
  transition: fill 0.18s ease;
}
.district:hover,
.district:focus {
  fill: var(--km-green);
  outline: none;
}
.district.is-selected {
  fill: var(--km-green-deep);
}
.district.is-covered {
  fill: var(--km-green-deep);
}
.district.is-covered:hover,
.district.is-covered:focus {
  fill: var(--km-green);
}

.km-info-col {
  flex: 1 1 auto;
  min-width: 0;
}
.km-info-card {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--km-sand-line);
  min-height: 52px;
  justify-content: flex-end;
}
.km-info-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--km-muted);
}
.km-info-name {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 18px;
  line-height: 1.4;
  color: var(--km-green-deep);
  transition: opacity 0.15s ease;
}

.km-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 16px;
}
.km-list li {
  font-size: 13px;
  color: var(--km-muted);
  padding: 3px 0;
  border-bottom: 1px dotted transparent;
  cursor: pointer;
  transition: color 0.15s ease;
}
.km-list li:hover, .km-list li.is-active {
  color: var(--km-green-deep);
  font-weight: 600;
}

@media (max-width: 560px) {
  .km-body { flex-direction: column; }
  .km-map-col { width: 100%; max-width: 220px; margin: 0 auto; }
  .km-list { grid-template-columns: 1fr 1fr; }
}
</style>

<script>
(function() {
  const root = document.currentScript.previousElementSibling.parentElement || document;
  const wrap = document.querySelector('.km-wrap');
  const nameEl = wrap.querySelector('#km-info-name');
  const listEl = wrap.querySelector('#km-list');
  const districts = wrap.querySelectorAll('.district');
  let selected = null;

  const coverageNames = 'Pathanamthitta, Kottayam, Alappuzha, Thiruvananthapuram, Kannur';
  const coverageSet = new Set(coverageNames.split(', '));

  const names = Array.from(districts).map(d => d.dataset.name).sort();
  names.forEach(n => {
    const li = document.createElement('li');
    li.textContent = n;
    li.dataset.name = n;
    if (coverageSet.has(n)) li.classList.add('is-covered');
    listEl.appendChild(li);
  });
  const listItems = wrap.querySelectorAll('.km-list li');

  function setActive(name) {
    nameEl.textContent = name || coverageNames;
    listItems.forEach(li => {
      const isHovered = li.dataset.name === name;
      li.classList.toggle('is-active', isHovered || (!name && li.classList.contains('is-covered')));
    });
  }

  districts.forEach(path => {
    path.addEventListener('mouseenter', () => setActive(path.dataset.name));
    path.addEventListener('mouseleave', () => setActive(selected ? selected.dataset.name : null));
    path.addEventListener('focus', () => setActive(path.dataset.name));
    path.addEventListener('click', () => {
      if (selected) selected.classList.remove('is-selected');
      if (selected === path) {
        selected = null;
      } else {
        path.classList.add('is-selected');
        selected = path;
      }
      setActive(selected ? selected.dataset.name : null);
    });
  });

  listItems.forEach(li => {
    li.addEventListener('mouseenter', () => setActive(li.dataset.name));
    li.addEventListener('mouseleave', () => setActive(selected ? selected.dataset.name : null));
    li.addEventListener('click', () => {
      const target = wrap.querySelector(`.district[data-name="${li.dataset.name}"]`);
      if (target) target.dispatchEvent(new Event('click'));
    });
  });
})();
</script>
